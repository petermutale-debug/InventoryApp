name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk \
            python3-pip libffi-dev libssl-dev libbz2-dev \
            libreadline-dev libsqlite3-dev wget curl llvm \
            libncurses5-dev xz-utils tk-dev
          pip install buildozer cython virtualenv

      - name: Accept Android licenses
        run: |
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          yes | buildozer android debug 2>&1 | head -5 || true
          yes | $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager \
            --sdk_root=$HOME/.buildozer/android/platform/android-sdk \
            --licenses || true

      - name: Build APK
        run: |
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: InventoryApp-APK
          path: bin/*.apk
